<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0, viewport-fit=cover"
/>

<title>โมจิ AI</title>

<link
href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;700&display=swap"
rel="stylesheet"
/>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,
body{

  width:100%;
  height:100%;

  overflow:hidden;

  background:#f5f5f5;

  font-family:'Sarabun',sans-serif;

}

.app{

  width:100%;
  height:100dvh;

  display:flex;
  flex-direction:column;

}

/* TOPBAR */

.topbar{

  height:64px;

  background:#fff;

  border-bottom:1px solid #ececec;

  display:flex;
  align-items:center;

  padding:0 14px;

  flex-shrink:0;

}

.avatar{

  width:42px;
  height:42px;

  border-radius:50%;

  background:#ece9ff;

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:22px;

}

.topinfo{
  margin-left:10px;
}

.title{
  font-size:16px;
  font-weight:700;
}

.sub{
  font-size:12px;
  color:#888;
}

.dot{

  width:10px;
  height:10px;

  border-radius:50%;

  background:#16c26a;

  margin-left:auto;

}

/* CHAT */

.messages{

  flex:1;

  overflow-y:auto;

  padding:14px;

  display:flex;
  flex-direction:column;

  gap:12px;

}

.wrap{

  display:flex;

  align-items:flex-end;

  gap:8px;

}

.wrap.user{
  flex-direction:row-reverse;
}

.mini{

  width:30px;
  height:30px;

  border-radius:50%;

  background:#ece9ff;

  display:flex;
  align-items:center;
  justify-content:center;

  flex-shrink:0;

}

.bubble{

  max-width:85%;

  padding:12px 14px;

  border-radius:18px;

  line-height:1.7;

  font-size:14px;

  white-space:pre-wrap;

  word-break:break-word;

}

.bubble.ai{

  background:#fff;

  border:1px solid #ececec;

  color:#222;

  border-bottom-left-radius:6px;

}

.bubble.user{

  background:#5146e5;

  color:#fff;

  border-bottom-right-radius:6px;

}

.typing{
  color:#999;
  font-style:italic;
}

/* QUICK */

.quick{

  display:flex;

  gap:8px;

  overflow-x:auto;

  padding:0 10px 10px;

  flex-shrink:0;

}

.quick::-webkit-scrollbar{
  display:none;
}

.qbtn{

  border:none;

  background:#fff;

  border:1px solid #ddd;

  border-radius:999px;

  padding:8px 14px;

  font-size:13px;

  white-space:nowrap;

  cursor:pointer;

  flex-shrink:0;

}

/* INPUT */

.inputbar{

  background:#fff;

  border-top:1px solid #ececec;

  padding:10px;

  display:flex;

  align-items:flex-end;

  gap:8px;

  flex-shrink:0;

}

textarea{

  flex:1;

  border:none;

  outline:none;

  resize:none;

  background:#f3f4f6;

  border-radius:20px;

  padding:12px 14px;

  font-size:14px;

  font-family:'Sarabun',sans-serif;

  min-height:44px;

  max-height:120px;

  overflow-y:auto;

}

.send{

  width:46px;
  height:46px;

  border:none;

  border-radius:50%;

  background:#5146e5;

  color:#fff;

  font-size:20px;

  cursor:pointer;

  flex-shrink:0;

}

.send:disabled{
  background:#ccc;
}

</style>
</head>
<body>

<div class="app">

  <!-- TOP -->
  <div class="topbar">

    <div class="avatar">🍡</div>

    <div class="topinfo">

      <div class="title">
        โมจิ AI
      </div>

      <div class="sub">
        ผู้ช่วยฝ่ายขายประกันชีวิต
      </div>

    </div>

    <div class="dot"></div>

  </div>

  <!-- CHAT -->
  <div
    class="messages"
    id="msgs"
  >

    <div class="wrap">

      <div class="mini">
        🍡
      </div>

      <div class="bubble ai">
สวัสดีค่ะ ฉันชื่อโมจิ 👋
ถามได้ทุกเรื่องเลยนะคะ
ค่าคอม เทคนิคขาย หรือความรู้ประกันค่ะ
      </div>

    </div>

  </div>

  <!-- QUICK -->
  <div class="quick">

    <button
      class="qbtn"
      onclick="send('ค่าคอมทีแอลแพลน')"
    >
      ทีแอลแพลน
    </button>

    <button
      class="qbtn"
      onclick="send('ค่าคอมธนทรัพย์')"
    >
      ธนทรัพย์
    </button>

    <button
      class="qbtn"
      onclick="send('ค่าคอมมันนี่ฟิต')"
    >
      มันนี่ฟิต
    </button>

    <button
      class="qbtn"
      onclick="send('เทคนิคปิดการขาย')"
    >
      เทคนิคขาย
    </button>

  </div>

  <!-- INPUT -->
  <div class="inputbar">

    <textarea
      id="inp"
      rows="1"
      placeholder="พิมพ์ข้อความ..."
      onkeydown="onKey(event)"
      oninput="resizeText(this)"
    ></textarea>

    <button
      class="send"
      id="sendBtn"
      onclick="send()"
    >
      ➤
    </button>

  </div>

</div>

<script>

/************************************************
 * GAS URL
 ************************************************/

const GAS_URL =
"https://script.google.com/macros/s/AKfycbyerelkxImFQOr3jg9A7WaSojD-rMW7xwVCQ-gYpv9hfyrkX1XE597ED-4SCDc0aHFB1Q/exec";

/************************************************
 * STATE
 ************************************************/

const history = [];

let busy = false;

/************************************************
 * ADD BUBBLE
 ************************************************/

function addBubble(text,role){

  const wrap =
    document.createElement("div");

  wrap.className =
    "wrap" +
    (
      role === "user"
      ? " user"
      : ""
    );

  if(role !== "user"){

    const mini =
      document.createElement("div");

    mini.className = "mini";

    mini.textContent = "🍡";

    wrap.appendChild(mini);

  }

  const bubble =
    document.createElement("div");

  bubble.className =
    "bubble " + role;

  bubble.textContent = text;

  wrap.appendChild(bubble);

  document
    .getElementById("msgs")
    .appendChild(wrap);

  wrap.scrollIntoView({
    behavior:"smooth"
  });

  return bubble;

}

/************************************************
 * SEND
 ************************************************/

async function send(preset){

  if(busy) return;

  const inp =
    document.getElementById("inp");

  const text =
    (
      preset ||
      inp.value
    ).trim();

  if(!text) return;

  inp.value = "";

  resizeText(inp);

  addBubble(text,"user");

  history.push({
    role:"user",
    content:text
  });

  busy = true;

  document
    .getElementById("sendBtn")
    .disabled = true;

  const typing =
    addBubble(
      "กำลังคิด...",
      "ai"
    );

  typing.classList.add(
    "typing"
  );

  try{

    const response =
      await fetch(

        GAS_URL,

        {

          method:"POST",

          headers:{
            "Content-Type":
            "text/plain;charset=utf-8"
          },

          body:JSON.stringify({

            type:"chat",

            message:text,

            messages:history

          })

        }

      );

    const data =
      await response.json();

    let reply =
      data.ok
      ? data.data
      : "เกิดข้อผิดพลาด";

    typing.textContent =
      reply;

    typing.classList.remove(
      "typing"
    );

    history.push({

      role:"assistant",

      content:reply

    });

  }catch(err){

    console.error(err);

    typing.textContent =
      "เชื่อมต่อ AI ไม่ได้ค่ะ 🙏";

    typing.classList.remove(
      "typing"
    );

  }

  busy = false;

  document
    .getElementById("sendBtn")
    .disabled = false;

}

/************************************************
 * ENTER
 ************************************************/

function onKey(e){

  if(

    e.key === "Enter" &&
    !e.shiftKey

  ){

    e.preventDefault();

    send();

  }

}

/************************************************
 * AUTO HEIGHT
 ************************************************/

function resizeText(el){

  el.style.height =
    "auto";

  el.style.height =

    Math.min(
      el.scrollHeight,
      120
    ) + "px";

}

</script>

</body>
</html>
