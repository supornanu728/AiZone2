<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
/>

<title>โมจิ AI</title>

<link
href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;700&display=swap"
rel="stylesheet"
/>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,
body{
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:'Sarabun',sans-serif;
  background:#f5f5f5;
}

body{
  display:flex;
  justify-content:center;
}

.app{

  width:100%;
  max-width:520px;
  height:100dvh;

  background:#f5f5f5;

  display:flex;
  flex-direction:column;

}

/* ===== TOPBAR ===== */

.topbar{

  height:64px;

  background:#ffffff;

  border-bottom:1px solid #ececec;

  display:flex;
  align-items:center;

  padding:0 14px;

  flex-shrink:0;

}

.avatar{

  width:42px;
  height:42px;

  border-radius:50%;

  background:#ece9ff;

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:22px;

}

.top-info{
  margin-left:10px;
}

.top-title{
  font-size:15px;
  font-weight:700;
  color:#222;
}

.top-sub{
  font-size:12px;
  color:#888;
}

.dot{

  width:10px;
  height:10px;

  background:#17b26a;

  border-radius:50%;

  margin-left:auto;

}

/* ===== CHAT ===== */

.messages{

  flex:1;

  overflow-y:auto;

  padding:14px;

  display:flex;
  flex-direction:column;

  gap:12px;

  scroll-behavior:smooth;

}

.wrap{

  display:flex;
  align-items:flex-end;

  gap:8px;

}

.wrap.user{
  flex-direction:row-reverse;
}

.mini{

  width:30px;
  height:30px;

  border-radius:50%;

  background:#ece9ff;

  display:flex;
  align-items:center;
  justify-content:center;

  flex-shrink:0;

}

.bubble{

  max-width:82%;

  padding:11px 14px;

  border-radius:18px;

  line-height:1.7;

  font-size:14px;

  word-break:break-word;

  white-space:pre-wrap;

}

.bubble.ai{

  background:#fff;

  border:1px solid #ececec;

  color:#222;

  border-bottom-left-radius:6px;

}

.bubble.user{

  background:#4f46e5;

  color:#fff;

  border-bottom-right-radius:6px;

}

.typing{
  color:#999;
  font-style:italic;
}

/* ===== QUICK BUTTON ===== */

.quick{

  padding:0 12px 10px;

  display:flex;
  gap:8px;

  overflow-x:auto;

  flex-shrink:0;

}

.quick::-webkit-scrollbar{
  display:none;
}

.qbtn{

  border:none;

  background:#fff;

  border:1px solid #ddd;

  color:#555;

  border-radius:999px;

  padding:8px 14px;

  white-space:nowrap;

  font-size:13px;

  cursor:pointer;

  flex-shrink:0;

}

.qbtn:active{
  transform:scale(.98);
}

/* ===== INPUT ===== */

.inputbar{

  background:#fff;

  border-top:1px solid #ececec;

  padding:10px;

  display:flex;
  align-items:flex-end;

  gap:8px;

  flex-shrink:0;

}

textarea{

  flex:1;

  resize:none;

  border:none;

  outline:none;

  background:#f3f4f6;

  border-radius:20px;

  padding:12px 14px;

  font-size:14px;

  font-family:'Sarabun',sans-serif;

  min-height:44px;
  max-height:120px;

  overflow-y:auto;

}

.send{

  width:46px;
  height:46px;

  border:none;

  border-radius:50%;

  background:#4f46e5;

  color:#fff;

  font-size:20px;

  cursor:pointer;

  flex-shrink:0;

}

.send:disabled{
  background:#ccc;
}

/* ===== MOBILE ===== */

@media (max-width:480px){

  .bubble{
    max-width:88%;
    font-size:14px;
  }

  .topbar{
    height:60px;
  }

  .messages{
    padding:12px;
  }

}

</style>
</head>
<body>

<div class="app">

  <!-- TOP -->
  <div class="topbar">

    <div class="avatar">🍡</div>

    <div class="top-info">

      <div class="top-title">
        โมจิ AI
      </div>

      <div class="top-sub">
        ผู้ช่วยฝ่ายขายประกันชีวิต
      </div>

    </div>

    <div class="dot"></div>

  </div>

  <!-- CHAT -->
  <div class="messages" id="msgs">

    <div class="wrap">

      <div class="mini">🍡</div>

      <div class="bubble ai">
สวัสดีค่ะ ฉันชื่อโมจิ 👋
ถามได้ทุกเรื่องเลยนะคะ
ค่าคอม เทคนิคขาย หรือความรู้ประกันค่ะ
      </div>

    </div>

  </div>

  <!-- QUICK -->
  <div class="quick">

    <button
      class="qbtn"
      onclick="send('ค่าคอมทีแอลแพลน')"
    >
      ทีแอลแพลน
    </button>

    <button
      class="qbtn"
      onclick="send('ค่าคอมธนทรัพย์')"
    >
      ธนทรัพย์
    </button>

    <button
      class="qbtn"
      onclick="send('ค่าคอมมันนี้ฟิต')"
    >
      มันนี่ฟิต
    </button>

    <button
      class="qbtn"
      onclick="send('เทคนิคปิดการขาย')"
    >
      เทคนิคขาย
    </button>

  </div>

  <!-- INPUT -->
  <div class="inputbar">

    <textarea
      id="inp"
      rows="1"
      placeholder="พิมพ์ข้อความ..."
      onkeydown="onKey(event)"
      oninput="resizeText(this)"
    ></textarea>

    <button
      class="send"
      id="sendBtn"
      onclick="send()"
    >
      ➤
    </button>

  </div>

</div>

<script>

/************************************************
 * CONFIG
 ************************************************/

const GAS_URL =
"https://script.google.com/macros/s/AKfycbyerelkxImFQOr3jg9A7WaSojD-rMW7xwVCQ-gYpv9hfyrkX1XE597ED-4SCDc0aHFB1Q/exec";

/************************************************
 * HISTORY
 ************************************************/

const history = [];

let busy = false;

/************************************************
 * UI
 ************************************************/

function addBubble(text,role){

  const wrap = document.createElement("div");

  wrap.className =
    "wrap" +
    (role === "user" ? " user" : "");

  if(role !== "user"){

    const mini =
      document.createElement("div");

    mini.className = "mini";

    mini.textContent = "🍡";

    wrap.appendChild(mini);

  }

  const bubble =
    document.createElement("div");

  bubble.className =
    "bubble " + role;

  bubble.textContent = text;

  wrap.appendChild(bubble);

  document
    .getElementById("msgs")
    .appendChild(wrap);

  bubble.scrollIntoView({
    behavior:"smooth",
    block:"end"
  });

  return bubble;

}

/************************************************
 * SEND
 ************************************************/

async function send(preset){

  if(busy) return;

  const inp =
    document.getElementById("inp");

  const text =
    (preset || inp.value).trim();

  if(!text) return;

  inp.value = "";

  resizeText(inp);

  addBubble(text,"user");

  history.push({
    role:"user",
    content:text
  });

  busy = true;

  document
    .getElementById("sendBtn")
    .disabled = true;

  const typing =
    addBubble("กำลังคิด...","ai");

  typing.classList.add("typing");

  try{

    const res = await fetch(
      GAS_URL,
      {
        method:"POST",

        headers:{
          "Content-Type":
          "application/json"
        },

        body:JSON.stringify({
          type:"chat",
          messages:history
        })
      }
    );

    const data = await res.json();

    let reply =
      data.ok
      ? data.data
      : "เกิดข้อผิดพลาด";

    typing.textContent = reply;

    typing.classList.remove(
      "typing"
    );

    history.push({
      role:"assistant",
      content:reply
    });

  }catch(err){

    typing.textContent =
      "เชื่อมต่อ AI ไม่ได้ค่ะ 🙏";

    typing.classList.remove(
      "typing"
    );

    console.error(err);

  }

  busy = false;

  document
    .getElementById("sendBtn")
    .disabled = false;

}

/************************************************
 * ENTER
 ************************************************/

function onKey(e){

  if(
    e.key === "Enter" &&
    !e.shiftKey
  ){

    e.preventDefault();

    send();

  }

}

/************************************************
 * AUTO RESIZE
 ************************************************/

function resizeText(el){

  el.style.height = "auto";

  el.style.height =
    Math.min(el.scrollHeight,120)
    + "px";

}

</script>

</body>
</html>
